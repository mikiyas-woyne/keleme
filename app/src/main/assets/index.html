<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Keleme</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Splash Screen -->
    <div id="splash-screen" class="screen active">
        <div class="splash-content">
            <h2 class="splash-title">AXUMIT STUDIOS</h2>
            <!-- Glowing Logo Placeholder -->
            <div class="logo-placeholder">
                <svg width="100" height="100" viewBox="0 0 100 100" class="neon-logo">
                    <!-- Overlapping glowing triangles or geometric patterns representing color/light -->
                    <polygon points="50,15 15,85 85,85" class="logo-polygon logo-cyan" />
                    <polygon points="50,25 25,80 75,80" class="logo-polygon logo-magenta" />
                    <polygon points="50,35 35,75 65,75" class="logo-polygon logo-yellow" />
                    <circle cx="50" cy="60" r="10" class="logo-core" />
                </svg>
            </div>
        </div>
    </div>

    <!-- Main Menu -->
    <div id="main-menu" class="screen">
        <div class="menu-content">
            <h1 class="game-title">Keleme</h1>
            <p class="game-description">Let's play with colors</p>
            
            <div class="menu-controls">
                <button id="start-btn" class="btn btn-primary" data-tag="start_button">START GAME</button>
                
                <div class="sound-toggle-container">
                    <span class="toggle-label">SOUND</span>
                    <button id="sound-btn" class="btn btn-toggle" data-tag="sound_toggle">ON</button>
                </div>
            </div>
            
            <div class="menu-footer">
                <p>HighScore: <span id="menu-highscore">0</span></p>
            </div>
        </div>
    </div>

    <!-- Gameplay Screen -->
    <div id="game-container" class="screen">
        <canvas id="game-canvas"></canvas>
        <div id="score-hud">
            <div class="score-box">SCORE: <span id="current-score">0</span></div>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over-screen" class="screen">
        <div class="gameover-content">
            <h2 class="gameover-title">GAME OVER</h2>
            
            <div class="score-display">
                <p class="score-label">FINAL SCORE</p>
                <p id="final-score" class="score-value">0</p>
                <p class="highscore-label">BEST: <span id="gameover-highscore">0</span></p>
            </div>
            
            <div class="gameover-controls">
                <button id="restart-btn" class="btn btn-primary" data-tag="restart_button">RESTART GAME</button>
                <button id="menu-btn" class="btn btn-secondary" data-tag="menu_button">MAIN MENU</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
